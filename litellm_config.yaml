model_list:
  - model_name: openai-gpt-5-4
    litellm_params:
      # https://developers.openai.com/api/docs/models/gpt-5.4
      model: gpt-5.4
      api_key: os.environ/OPENAI_API_KEY
  - model_name: openai-gpt-5-4-mini
    litellm_params:
      # https://developers.openai.com/api/docs/models/gpt-5.4-mini
      model: gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: openai-gpt-5-4-nano
    litellm_params:
      # https://developers.openai.com/api/docs/models/gpt-5.4-nano
      model: gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY
  #  - model_name: google-gemini-2.0-flash
  #    litellm_params:
  #      # https://cloud.google.com/vertex-ai/generative-ai/docs/learn/model-versioning
  #      model: vertex_ai/gemini-2.0-flash-001
  #      vertex_project: os.environ/GOOGLE_VERTEX_PROJECT
  #      vertex_location: os.environ/GOOGLE_VERTEX_LOCATION
  - model_name: anthropic-opus-4-6
    litellm_params:
      # https://docs.anthropic.com/claude/docs/models-overview
      model: claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic-sonnet-4-6
    litellm_params:
      # https://docs.anthropic.com/claude/docs/models-overview
      model: claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: groq-llama-3.3-70b
    litellm_params:
      # https://console.groq.com/docs/models
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: local-google-gemma3
    litellm_params:
      model: ollama/gemma3:27b-it-qat
      api_base: http://ollama:11434
  - model_name: local-llama3-1-8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434
  - model_name: local-qwen3.5-27b
    litellm_params:
      model: ollama/qwen3.5:27b
      api_base: http://ollama:11434
  - model_name: local-gpt-oss-20b
    litellm_params:
      model: ollama/gpt-oss:20b
      api_base: http://ollama:11434

litellm_settings:
  drop_params: True
  max_budget: 100
  budget_duration: 30d
  num_retries: 2
  request_timeout: 600

general_settings:
  proxy_batch_write_at: 60
  database_url: os.environ/POSTGRES_DB_URL
  user_header_name: X-OpenWebUI-User-Email
